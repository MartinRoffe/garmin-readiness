<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:         #09090b;
  --surface:    #111114;
  --surface2:   #18181b;
  --border:     #27272a;
  --border2:    #3f3f46;
  --accent:     #a3e635;
  --accent-dim: rgba(163,230,53,0.07);
  --blue:       #60a5fa;
  --blue-dim:   rgba(96,165,250,0.1);
  --orange:     #fb923c;
  --red:        #f87171;
  --green:      #4ade80;
  --muted:      #c4c4cc;
  --text:       #fafafa;
  --text-dim:   #d1d5db;
  --font-d: 'Bebas Neue', sans-serif;
  --font-b: 'DM Sans', system-ui, sans-serif;
  --font-m: 'DM Mono', 'ui-monospace', monospace;
}

*, *::before, *::after { box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-b);
  font-weight: 300;
  line-height: 1.6;
  min-height: 100vh;
}

::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.gr-nav {
  background: rgba(9,9,11,0.92);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.gr-nav-inner {
  max-width: 1080px;
  margin: 0 auto;
  display: flex;
  align-items: stretch;
  overflow-x: auto;
  scrollbar-width: none;
}
.gr-nav-inner::-webkit-scrollbar { display: none; }

.gr-brand {
  font-family: var(--font-d);
  font-size: 19px;
  letter-spacing: 0.12em;
  color: var(--accent);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 0;
  margin-right: 12px;
  flex-shrink: 0;
}
.gr-brand-sep {
  width: 1px;
  height: 14px;
  background: var(--border2);
  flex-shrink: 0;
}
.gr-brand-sub {
  font-family: var(--font-m);
  font-size: 11px;
  letter-spacing: 0.22em;
  color: var(--muted);
  text-transform: uppercase;
}
.gr-nav a.tab {
  text-decoration: none;
  padding: 4px 12px 0;
  font-family: var(--font-b);
  font-size: 13px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 400;
  color: var(--muted);
  transition: color 0.15s;
  border-bottom: 2px solid transparent;
  display: flex;
  align-items: center;
  white-space: nowrap;
}
.gr-nav a.tab:hover { color: var(--text-dim); }
.gr-nav a.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Coaching tooltip ────────────────────────────────────────────── */
.gr-tip-trigger {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; height: 14px; border-radius: 50%;
  border: 1px solid #3f3f46; background: transparent;
  color: #71717a; font-family: 'DM Mono','ui-monospace',monospace; font-size: 9px;
  cursor: default; vertical-align: middle; margin-left: 5px;
  flex-shrink: 0; transition: border-color 0.15s, color 0.15s;
  user-select: none; line-height: 1; padding: 0;
}
.gr-tip-trigger:hover,
.gr-tip-trigger[aria-expanded="true"] { border-color: #71717a; color: #c4c4cc; outline: none; }

.gr-tip-popup {
  position: fixed; z-index: 1000;
  max-width: 280px; padding: 10px 12px;
  background: #1c1c1f; border: 1px solid #3f3f46; border-radius: 4px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.55);
  font-family: 'DM Mono','ui-monospace',monospace;
  font-size: 12px; line-height: 1.55; color: #c4c4cc;
  white-space: normal; word-break: break-word;
  pointer-events: none; opacity: 0; transition: opacity 0.12s ease;
}
.gr-tip-popup.is-visible { opacity: 1; pointer-events: auto; }
</style>

<nav class="gr-nav">
  <div class="gr-nav-inner">
    <a href="/" class="tab {% if active_tab == 'readiness' %}active{% endif %}">Readiness</a>
    <a href="/performance" class="tab {% if active_tab == 'performance' %}active{% endif %}">Performance</a>
    <a href="/analysis" class="tab {% if active_tab == 'analysis' %}active{% endif %}">Analysis</a>
    <a href="/calendar" class="tab {% if active_tab == 'calendar' %}active{% endif %}">Calendar</a>
    <a href="/training" class="tab {% if active_tab == 'training' %}active{% endif %}">Training</a>
    <a href="/compliance" class="tab {% if active_tab == 'compliance' %}active{% endif %}">Compliance</a>
    <a href="/nutrition" class="tab {% if active_tab == 'nutrition' %}active{% endif %}">Nutrition</a>
    <a href="/sleep" class="tab {% if active_tab == 'sleep' %}active{% endif %}">Sleep</a>
    <a href="/body" class="tab {% if active_tab == 'body' %}active{% endif %}">Body</a>
    <a href="/tenerife" class="tab {% if active_tab == 'tenerife' %}active{% endif %}">Tenerife</a>
    <a href="/haute-route" class="tab {% if active_tab == 'haute_route' %}active{% endif %}">Haute Route</a>
    <a href="/coach" class="tab {% if active_tab == 'coach' %}active{% endif %}">Coach</a>

  </div>
</nav>
<script>
(function () {
  const tip = document.createElement('div');
  tip.className = 'gr-tip-popup';
  tip.setAttribute('role', 'tooltip');
  document.body.appendChild(tip);
  let active = null;
  const GAP = 8;
  function pos(trigger) {
    tip.textContent = trigger.dataset.tip || '';
    const r = trigger.getBoundingClientRect();
    const h = tip.offsetHeight, w = tip.offsetWidth, vw = window.innerWidth;
    const top = r.top < h + GAP ? r.bottom + GAP : r.top - h - GAP;
    let left = r.left + r.width / 2 - w / 2;
    left = Math.max(8, Math.min(left, vw - w - 8));
    tip.style.top = top + 'px'; tip.style.left = left + 'px';
  }
  function show(t) { if (active && active !== t) hide(); active = t; t.setAttribute('aria-expanded','true'); pos(t); tip.classList.add('is-visible'); }
  function hide() { if (!active) return; active.setAttribute('aria-expanded','false'); active = null; tip.classList.remove('is-visible'); }
  const canHover = window.matchMedia('(hover:hover)').matches;
  document.addEventListener('mouseover', e => { if (canHover) { const t = e.target.closest('[data-tip]'); if (t) show(t); } });
  document.addEventListener('mouseout',  e => { if (canHover) { const t = e.target.closest('[data-tip]'); if (t && !t.contains(e.relatedTarget)) hide(); } });
  document.addEventListener('click',     e => { const t = e.target.closest('[data-tip]'); if (t) { e.stopPropagation(); active === t ? hide() : show(t); return; } hide(); });
  document.addEventListener('keydown',   e => { if (e.key === 'Escape') hide(); });
  document.addEventListener('focusin',   e => { const t = e.target.closest('[data-tip]'); if (t) show(t); });
  document.addEventListener('focusout',  e => { const t = e.target.closest('[data-tip]'); if (t && !t.contains(e.relatedTarget)) hide(); });
  window.addEventListener('scroll', hide, { passive: true, capture: true });
  window.addEventListener('resize', hide, { passive: true });
})();
</script>
