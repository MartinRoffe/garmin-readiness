<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:         #09090b;
  --surface:    #111114;
  --surface2:   #18181b;
  --border:     #27272a;
  --border2:    #3f3f46;
  --accent:     #a3e635;
  --accent-dim: rgba(163,230,53,0.07);
  --blue:       #60a5fa;
  --blue-dim:   rgba(96,165,250,0.1);
  --orange:     #fb923c;
  --red:        #f87171;
  --green:      #4ade80;
  --muted:      #c4c4cc;
  --text:       #fafafa;
  --text-dim:   #d1d5db;
  --font-d: 'Bebas Neue', sans-serif;
  --font-b: 'DM Sans', system-ui, sans-serif;
  --font-m: 'DM Mono', 'ui-monospace', monospace;
}

*, *::before, *::after { box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-b);
  font-weight: 300;
  line-height: 1.6;
  min-height: 100vh;
}

::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.gr-nav {
  background: rgba(9,9,11,0.92);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.gr-nav-inner {
  max-width: 1080px;
  margin: 0 auto;
  display: flex;
  align-items: stretch;
  overflow-x: auto;
  scrollbar-width: none;
}
.gr-nav-inner::-webkit-scrollbar { display: none; }

.gr-brand {
  font-family: var(--font-d);
  font-size: 19px;
  letter-spacing: 0.12em;
  color: var(--accent);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 0;
  margin-right: 12px;
  flex-shrink: 0;
}
.gr-brand-sep {
  width: 1px;
  height: 14px;
  background: var(--border2);
  flex-shrink: 0;
}
.gr-brand-sub {
  font-family: var(--font-m);
  font-size: 11px;
  letter-spacing: 0.22em;
  color: var(--muted);
  text-transform: uppercase;
}
.gr-nav a.tab {
  text-decoration: none;
  padding: 4px 12px 0;
  font-family: var(--font-b);
  font-size: 13px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 400;
  color: var(--muted);
  transition: color 0.15s;
  border-bottom: 2px solid transparent;
  display: flex;
  align-items: center;
  white-space: nowrap;
}
.gr-nav a.tab:hover { color: var(--text-dim); }
.gr-nav a.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
</style>

<nav class="gr-nav">
  <div class="gr-nav-inner">
    <a href="/" class="tab {% if active_tab == 'readiness' %}active{% endif %}">Readiness</a>
    <a href="/performance" class="tab {% if active_tab == 'performance' %}active{% endif %}">Performance</a>
    <a href="/analysis" class="tab {% if active_tab == 'analysis' %}active{% endif %}">Analysis</a>
    <a href="/calendar" class="tab {% if active_tab == 'calendar' %}active{% endif %}">Calendar</a>
    <a href="/training" class="tab {% if active_tab == 'training' %}active{% endif %}">Training</a>
    <a href="/compliance" class="tab {% if active_tab == 'compliance' %}active{% endif %}">Compliance</a>
    <a href="/nutrition" class="tab {% if active_tab == 'nutrition' %}active{% endif %}">Nutrition</a>
    <a href="/sleep" class="tab {% if active_tab == 'sleep' %}active{% endif %}">Sleep</a>
    <a href="/body" class="tab {% if active_tab == 'body' %}active{% endif %}">Body</a>
    <a href="/tenerife" class="tab {% if active_tab == 'tenerife' %}active{% endif %}">Tenerife</a>
    <a href="/haute-route" class="tab {% if active_tab == 'haute_route' %}active{% endif %}">Haute Route</a>

  </div>
</nav>
